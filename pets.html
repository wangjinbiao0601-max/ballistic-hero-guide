<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pets - Ballistic Hero 攻略站 · 弹弹英雄</title>
<meta name="description" content="Ballistic Hero 全宠物图鉴 — 白绿蓝紫橙品质宠物，包含属性、技能、获取方式">
<style>
:root {
  --bg: #0a0e1a; --bg-card: #111827; --bg-card-alt: #1a2332;
  --text: #e2e8f0; --text-secondary: #94a3b8; --text-muted: #64748b;
  --accent: #f59e0b; --accent-light: #fbbf24; --accent-dim: #d97706;
  --blue: #3b82f6; --blue-light: #60a5fa; --green: #22c55e; --red: #ef4444; --purple: #a855f7;
  --border: #1e293b; --border-light: #334155;
  --radius: 12px; --radius-sm: 8px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  --q-white: #e2e8f0; --q-green: #22c55e; --q-blue: #3b82f6; --q-purple: #a855f7; --q-orange: #f59e0b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
a { color:var(--blue-light); text-decoration:none; }
a:hover { text-decoration:underline; }
header { background:linear-gradient(135deg,#0f172a,#1a2332,#0f172a); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; padding:0 20px; }
.header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:60px; }
.logo { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; color:var(--accent); }
.logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),var(--accent-dim)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; color:#000; font-weight:900; }
.lang-btn { background:var(--bg-card-alt); border:1px solid var(--border-light); color:var(--text); padding:6px 14px; border-radius:20px; cursor:pointer; font-size:13px; transition:all .2s; }
.lang-btn:hover { border-color:var(--accent); color:var(--accent); }
.lang-toggle-wrap { display:flex; align-items:center; gap:10px; }
.lang-label { font-size:12px; color:var(--text-muted); }
.tabs { background:var(--bg-card); border-bottom:1px solid var(--border); overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; }
.tabs-inner { max-width:1200px; margin:0 auto; display:flex; padding:0 20px; }
.tab { display:block; padding:12px 22px; font-size:14px; color:var(--text-secondary); border-bottom:2px solid transparent; transition:all .2s; }
.tab:hover { color:var(--accent); text-decoration:none; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }
main { max-width:1200px; margin:0 auto; padding:30px 20px; }
.section-title { font-size:24px; font-weight:700; color:var(--accent); margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.section-desc { color:var(--text-secondary); font-size:14px; margin-bottom:24px; }
.filter-bar { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.filter-btn { padding:6px 18px; border-radius:20px; border:1px solid var(--border-light); background:var(--bg-card-alt); color:var(--text-secondary); cursor:pointer; font-size:13px; transition:all .2s; }
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(245,158,11,0.1); font-weight:500; }
.pet-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.q-badge { display:inline-block; padding:2px 10px; border-radius:4px; font-size:11px; font-weight:600; }
.q-white { background:rgba(226,232,240,0.15); color:var(--q-white); }
.q-green { background:rgba(34,197,94,0.15); color:var(--q-green); }
.q-blue { background:rgba(59,130,246,0.15); color:var(--q-blue); }
.q-purple { background:rgba(168,85,247,0.15); color:var(--q-purple); }
.q-orange { background:rgba(245,158,11,0.15); color:var(--q-orange); }
.qty-group-title { font-size:16px; font-weight:700; margin:24px 0 12px; display:flex; align-items:center; gap:8px; }
.pet-card { background:var(--bg-card-alt); border:1px solid var(--border); border-radius:var(--radius); padding:18px; transition:all .2s; }
.pet-card:hover { transform:translateY(-2px); }
.pet-card-header { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.pet-card-img { width:56px; height:56px; border-radius:8px; object-fit:contain; flex-shrink:0; }
.pet-card-name { font-size:16px; font-weight:700; }
.pet-card-name small { font-weight:400; color:var(--text-muted); font-size:13px; }
.pet-type { font-size:11px; padding:2px 10px; border-radius:4px; display:inline-block; }
.type-atk { background:rgba(239,68,68,0.15); color:#ef4444; }
.type-def { background:rgba(59,130,246,0.15); color:#60a5fa; }
.type-spd { background:rgba(34,197,94,0.15); color:#22c55e; }
.stat-row { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin:10px 0; padding:10px; background:var(--bg); border-radius:6px; }
.stat-item { text-align:center; }
.stat-label { font-size:11px; color:var(--text-muted); }
.stat-val { font-size:15px; font-weight:700; }
.skill-list { margin-top:8px; }
.skill-item { padding:6px 10px; background:var(--bg); border-radius:6px; font-size:13px; color:var(--text-secondary); margin-bottom:4px; line-height:1.5; }
.skill-item::before { content:'▸'; color:var(--accent); margin-right:6px; }
footer { border-top:1px solid var(--border); padding:30px 20px; text-align:center; color:var(--text-muted); font-size:13px; }
@media (max-width:768px) { .pet-grid { grid-template-columns:1fr; } .stat-row { grid-template-columns:repeat(5,1fr); gap:4px; } .tab { padding:10px 14px; font-size:13px; } }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--accent);font-size:18px;font-weight:700;">
      <div class="logo-icon">BH</div>
      <span>Ballistic Hero</span>
    </a>
    <div class="lang-toggle-wrap">
      <span class="lang-label" data-i18n="langLabel">语言</span>
      <button class="lang-btn" id="langToggle" onclick="toggleLang()">English</button>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tabs-inner">
    <a href="index.html" class="tab" data-i18n="tabHome">首页</a>
    <a href="weapons.html" class="tab" data-i18n="tabWeapons">武器</a>
    <a href="equipment.html" class="tab" data-i18n="tabEquipment">装备</a>
    <a href="pets.html" class="tab active" data-i18n="tabPets">宠物</a>
  </div>
</div>

<main>
  <h2 class="section-title">🐾 <span data-i18n="petTitle">全宠物图鉴</span></h2>
  <p class="section-desc" data-i18n="petDesc">按品质筛选，查看宠物属性与技能详情</p>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="filterPets('all')" data-i18n="all">全部</button>
    <button class="filter-btn" onclick="filterPets('白')" style="border-color:var(--q-white);color:var(--q-white)">白</button>
    <button class="filter-btn" onclick="filterPets('绿')" style="border-color:var(--q-green);color:var(--q-green)">绿</button>
    <button class="filter-btn" onclick="filterPets('蓝')" style="border-color:var(--q-blue);color:var(--q-blue)">蓝</button>
    <button class="filter-btn" onclick="filterPets('紫')" style="border-color:var(--q-purple);color:var(--q-purple)">紫</button>
    <button class="filter-btn" onclick="filterPets('橙')" style="border-color:var(--q-orange);color:var(--q-orange)">橙</button>
  </div>

  <div id="petContainer"></div>
</main>

<footer>
  <p data-i18n="footerText">Ballistic Hero 攻略站 · 数据来源于游戏与玩家社区 · 非官方站点</p>
  <p style="margin-top:6px;font-size:12px;" data-i18n="footerContact">如有错误或补充，欢迎反馈</p>
</footer>

<script>
const ALL_PETS = [
  // 白
  {q:'白',name:'萨多',en:'Zarto',type:'攻击型',lv:20,stat:[38,15,38,120,40],skill:['震荡冲击']},
  {q:'白',name:'尤里',en:'Yuri',type:'防御型',lv:20,stat:[15,23,64,113,60],skill:['灵魂共享18%']},
  {q:'白',name:'菲奥',en:'Fio',type:'速度型',lv:20,stat:[23,15,38,126,60],skill:['窝心顶25%+推条10%']},
  // 绿
  {q:'绿',name:'布雷泽',en:'Blazer',type:'攻击型',lv:30,stat:[58,23,145,125,40],skill:['震荡冲击','好斗+10%攻']},
  {q:'绿',name:'丘比',en:'Qbee',type:'防御型',lv:30,stat:[35,47,180,118,60],skill:['灵魂共享18%','坚韧+18%防']},
  {q:'绿',name:'梅迪',en:'Maidy',type:'速度型',lv:30,stat:[47,23,108,136,60],skill:['窝心顶','灵巧+24%速']},
  // 蓝
  {q:'蓝',name:'卡尔',en:'',type:'攻击型',lv:50,stat:[68,27,168,126,40],skill:['高级奋力一击128%','野蛮冲撞70%']},
  {q:'蓝',name:'菲多',en:'',type:'防御型',lv:50,stat:[55,27,126,137,60],skill:['高级盗取64%+300BP','破坏顶']},
  {q:'蓝',name:'梅林',en:'',type:'速度型',lv:50,stat:[41,54,210,118,60],skill:['高级援护术48%','报恩25%']},
  // 紫
  {q:'紫',name:'咒鬼',en:'',type:'攻击型',lv:70,stat:[78,31,192,127,40],skill:['奋力一击80%','高级震荡80%']},
  {q:'紫',name:'岩精灵',en:'',type:'防御型',lv:70,stat:[47,62,240,119,60],skill:['援护29%','报恩25%','高级灵魂共享30%']},
  {q:'紫',name:'草精灵',en:'',type:'速度型',lv:70,stat:[62,31,144,138,60],skill:['卸力顶50%毒','毒气顶','高级窝心40%+推15%']},
  {q:'紫',name:'火精灵',en:'',type:'攻击型',lv:80,stat:[88,35,216,129,40],skill:['高级极限144%','高级奋力128%']},
  {q:'紫',name:'卡皮巴拉',en:'',type:'攻击型',lv:70,stat:[156,62,384,132,60],skill:['高级燃烧160%','高级野蛮112%']},
  {q:'紫',name:'大声公',en:'',type:'速度型',lv:80,stat:[70,35,162,140,60],skill:['高级迟缓80%+速降','高级盗取']},
  {q:'紫',name:'鹿灵',en:'',type:'防御型',lv:80,stat:[53,70,270,120,60],skill:['高级守护54%','高级援护48%']},
  {q:'紫',name:'彩虹小马',en:'',type:'防御型',lv:70,stat:[94,124,480,120,90],skill:['高级报恩42%','高级强壮35%']},
  {q:'紫',name:'迪迪',en:'',type:'速度型',lv:70,stat:[124,62,288,150,110],skill:['高级拾取600BP','高级毒气64%+2毒']},
  // 橙
  {q:'橙',name:'飞翼天狼',en:'',type:'速度型',lv:100,stat:[200,100,460,166,118],skill:['啸月(专属)']},
  {q:'橙',name:'翠蝶女王',en:'',type:'防御型',lv:100,stat:[150,200,768,130,106],skill:['女王的恩赐(专属)']},
  {q:'橙',name:'缪斯',en:'',type:'攻击型',lv:100,stat:[250,100,615,146,90],skill:['传颂之音(专属)']},
  {q:'橙',name:'伊卡洛斯',en:'',type:'防御型',lv:100,stat:[150,200,768,130,106],skill:['守护之翼','至高牺牲']},
  {q:'橙',name:'鲸鱼娘',en:'',type:'攻击型',lv:100,stat:[260,100,615,146,118],skill:['鲸吞','洋流祝福']},
  {q:'橙',name:'拉霸霸',en:'',type:'速度型',lv:100,stat:[260,100,460,166,138],skill:['暴力夺取(专属)']},
  {q:'橙',name:'神灯',en:'',type:'防御型',lv:100,stat:[150,200,768,130,106],skill:['三个愿望','虚化躯体']},
  {q:'橙',name:'上古幼龙',en:'',type:'攻击型',lv:100,stat:[260,100,615,146,118],skill:['无根之火','双相龙鳞']},
  {q:'橙',name:'魔法黑猫',en:'',type:'速度型',lv:100,stat:[260,100,460,166,138],skill:['禁忌知识','多层护盾']},
  {q:'橙',name:'驯鹿精灵',en:'',type:'防御型',lv:100,stat:[150,200,768,130,106],skill:['圣诞庇佑','强健身躯']},
  {q:'橙',name:'龙马',en:'',type:'攻击型',lv:100,stat:[260,100,615,146,118],skill:['跃进重踏','龙气护体']},
  {q:'橙',name:'丘比特',en:'',type:'速度型',lv:100,stat:[260,100,460,166,138],skill:['真·夺心之箭','圣灵之体']},
  {q:'橙',name:'彩蛋神兔',en:'',type:'防御型',lv:100,stat:[150,200,768,130,106],skill:['重型彩蛋','肉食主义']},
  {q:'橙',name:'冰雪女王',en:'',type:'攻击型',lv:100,stat:[260,100,615,146,118],skill:['霜冻之息','永冻之意']}
];

const TYPE_CLASS = {攻击型:'type-atk',防御型:'type-def',速度型:'type-spd'};
const QLABELS = {白:'q-white',绿:'q-green',蓝:'q-blue',紫:'q-purple',橙:'q-orange'};
const STAT_LABELS = ['攻击','防御','生命','速度','精准'];
let currentFilter = 'all';

function renderPets(filter) {
  currentFilter = filter;
  const container = document.getElementById('petContainer');
  const filtered = filter === 'all' ? ALL_PETS : ALL_PETS.filter(p => p.q === filter);
  const groups = {};
  filtered.forEach(p => {
    if (!groups[p.q]) groups[p.q] = [];
    groups[p.q].push(p);
  });
  const order = ['白','绿','蓝','紫','橙'];
  let html = '';
  order.forEach(q => {
    if (!groups[q]) return;
    html += `<div class="qty-group-title"><span class="q-badge ${QLABELS[q]}">${q}</span> 品质宠物 · ${groups[q].length}只</div>`;
    html += '<div class="pet-grid">';
    groups[q].forEach(p => {
      const imgFile = getPetImage(p.name);
      html += `<div class="pet-card">`;
      html += `<div class="pet-card-header">`;
      html += `<img class="pet-card-img" src="${imgFile}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">`;
      html += `<div><div class="pet-card-name">${p.name} ${p.en ? `<small>${p.en}</small>` : ''}</div>`;
      html += `<span class="pet-type ${TYPE_CLASS[p.type]||''}">${p.type}</span>`;
      html += ` <span style="font-size:12px;color:var(--text-muted);">Lv.${p.lv}</span>`;
      html += ` <span class="q-badge ${QLABELS[p.q]}" style="font-size:10px;">${p.q}</span>`;
      html += `</div></div>`;
      // Stats
      html += `<div class="stat-row">`;
      p.stat.forEach((v,i) => {
        html += `<div class="stat-item"><div class="stat-val">${v}</div><div class="stat-label">${STAT_LABELS[i]}</div></div>`;
      });
      html += `</div>`;
      // Skills
      html += `<div class="skill-list">`;
      p.skill.forEach(s => {
        html += `<div class="skill-item">${s}</div>`;
      });
      html += `</div>`;
      html += `</div>`;
    });
    html += '</div>';
  });
  if (filtered.length === 0) {
    html = `<p style="color:var(--text-muted);text-align:center;padding:40px;">该品质暂无数据</p>`;
  }
  container.innerHTML = html;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${filter}'`));
  });
}

function getPetImage(name) {
  const map = {
    '蜜蜂':'pet_bee.png','精灵':'pet_bug.png','幽灵':'pet_ghost1.png','幻影':'pet_ghost2.png','巫师':'pet_wizard.png'
  };
  for (const [key,val] of Object.entries(map)) {
    if (name.includes(key)) return 'images/' + val;
  }
  // Try to find image by name match
  const imgMap = {
    '卡皮巴拉':'pet_bee.png','上古幼龙':'pet_wizard.png'
  };
  return imgMap[name] ? 'images/' + imgMap[name] : 'images/pet_bee.png';
}

function filterPets(q) { renderPets(q); }
renderPets('all');

const i18n = {
  zh:{langLabel:'语言',tabHome:'首页',tabWeapons:'武器',tabEquipment:'装备',tabPets:'宠物',petTitle:'全宠物图鉴',petDesc:'按品质筛选，查看宠物属性与技能详情',all:'全部',footerText:'Ballistic Hero 攻略站 · 非官方站点',footerContact:'如有错误或补充，欢迎反馈'},
  en:{langLabel:'Language',tabHome:'Home',tabWeapons:'Weapons',tabEquipment:'Equipment',tabPets:'Pets',petTitle:'All Pets',petDesc:'Filter by quality. View stats and skills.',all:'All',footerText:'Ballistic Hero Guide · Unofficial site',footerContact:'Corrections? Feedback welcome.'}
};
let curLang=localStorage.getItem('bh_lang')||'zh';
function applyLang(l){curLang=l;const d=i18n[l];document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(d[k]!==undefined)el.textContent=d[k]});document.documentElement.lang=l==='zh'?'zh-CN':'en';document.getElementById('langToggle').textContent=l==='zh'?'English':'中文';localStorage.setItem('bh_lang',l)}
function toggleLang(){applyLang(curLang==='zh'?'en':'zh')}
applyLang(curLang);
</script>
</body>
</html>
