.tab:hover { color:var(--accent); text-decoration:none; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }
main { max-width:1200px; margin:0 auto; padding:30px 20px; }

// Reverse lookup: ID → {name, ...data}
const SKILL_BY_ID = {};
for (const [name, data] of Object.entries(SKILL_DB)) {
  SKILL_BY_ID[data.id] = {name, ...data};
}

const TYPE_CLASS = {攻击型:'type-atk',防御型:'type-def',速度型:'type-spd'};
const QLABELS = {白:'q-white',绿:'q-green',蓝:'q-blue',紫:'q-purple',橙:'q-orange'};
const STAT_LABELS = ['攻击','防御','生命','速度','精准'];
let currentFilter = 'all';

function renderPets(filter) {
  currentFilter = filter;
  const container = document.getElementById('petContainer');
  const filtered = filter === 'all' ? ALL_PETS : ALL_PETS.filter(p => p.q === filter);
  const groups = {};
  filtered.forEach(p => {
    if (!groups[p.q]) groups[p.q] = [];
    groups[p.q].push(p);
  });
  const order = ['白','绿','蓝','紫','橙'];
  let html = '';
  order.forEach(q => {
    if (!groups[q]) return;
    html += `<div class="qty-group-title"><span class="q-badge ${QLABELS[q]}">${q}</span> 品质宠物 · ${groups[q].length}只</div>`;
    html += '<div class="pet-grid">';
    groups[q].forEach(p => {
      const imgFile = getPetImage(p.name);
      html += `<div class="pet-card">`;
      html += `<div class="pet-card-header">`;
      html += `<img class="pet-card-img" src="${imgFile}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">`;
      html += `<div><div class="pet-card-name">${p.name} ${p.en ? `<small>${p.en}</small>` : ''}</div>`;
      html += `<span class="pet-type ${TYPE_CLASS[p.type]||''}">${p.type}</span>`;
      html += ` <span style="font-size:12px;color:var(--text-muted);">Lv.${p.lv}</span>`;
      html += ` <span class="q-badge ${QLABELS[p.q]}" style="font-size:10px;">${p.q}</span>`;
      html += `</div></div>`;
      // Stats
      html += `<div class="stat-row">`;
      p.stat.forEach((v,i) => {
        html += `<div class="stat-item"><div class="stat-val">${v}</div><div class="stat-label">${STAT_LABELS[i]}</div></div>`;
      });
      html += `</div>`;
      // Skills - combine fixed(display order) + init extras
      const fixedSet = new Set();
      const allSkills = [];
      // Step 1: add fixed skills in order
      (p.fixed || []).forEach(f => {
        const fid = f.match(/^(\d+)/)?.[1];
        const fname = fid && SKILL_BY_ID[fid] ? SKILL_BY_ID[fid].name : null;
        // If entry is just a bare ID, use the lookup name
        allSkills.push({name: fid && !isNaN(parseInt(f)) ? (fname || f) : f, isFixed: true, id: fid});
        if (fid) fixedSet.add(fid);
      });
      // Step 2: add init skills not in fixed in order
      (p.init || []).forEach(id => {
        if (!fixedSet.has(id)) {
          const s = SKILL_BY_ID[id];
          allSkills.push({name: s ? s.name : id, isFixed: false, id: id});
        }
      });

      html += `<div class="skill-list">`;
      allSkills.forEach(item => {
        // Find skill data: try name match first, then ID
        let s = SKILL_DB[item.name] || SKILL_BY_ID[item.id || item.name.match(/^(\d+)/)?.[1]];
        if (!s) {
          for (const [k,v] of Object.entries(SKILL_DB)) {
            if (item.name.includes(k)) { s = v; break; }
          }
        }
        if (s) {
          html += `<div class="skill-detail-card ${item.isFixed ? 'fixed-skill' : ''}">
            <div class="skill-detail-header">
              <span class="skill-detail-name"><span class="skill-id">${s.id}</span> ${s.name}${item.isFixed ? '<span class="fixed-badge">固定</span>' : ''}</span>
              <span class="skill-detail-meta">
                <span class="sd-type ${s.type==='被动'?'sd-passive':s.type.includes('辅助')||s.type.includes('防御')?'sd-support':'sd-active'}">${s.type}</span>
                ${s.mp > 0 ? `<span class="sd-mp">MP ${s.mp}</span>` : ''}
                ${s.cd > 0 ? `<span class="sd-cd">CD ${s.cd}</span>` : ''}
                ${s.dmg && s.dmg !== '—' ? `<span class="sd-dmg">${s.dmg}</span>` : ''}
              </span>
            </div>
            ${s.eff && s.eff !== '—' ? `<div class="skill-detail-eff">${s.eff}</div>` : ''}
          </div>`;
        } else {
          // Fallback: show plain name
          html += `<div class="skill-item">${item.name}</div>`;
        }
      });
      html += `</div>`;
      html += `</div>`;
    });
    html += '</div>';
  });
  if (filtered.length === 0) {
    html = `<p style="color:var(--text-muted);text-align:center;padding:40px;">该品质暂无数据</p>`;
  }
  container.innerHTML = html;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${filter}'`));
  });
}

function getPetImage(name) {
  const map = {
    '蜜蜂':'pet_bee.png','精灵':'pet_bug.png','幽灵':'pet_ghost1.png','幻影':'pet_ghost2.png','巫师':'pet_wizard.png'
  };
  for (const [key,val] of Object.entries(map)) {
    if (name.includes(key)) return 'images/' + val;
  }
  // Try to find image by name match
  const imgMap = {
    '卡皮巴拉':'pet_bee.png','上古幼龙':'pet_wizard.png'
  };
  return imgMap[name] ? 'images/' + imgMap[name] : 'images/pet_bee.png';
}

function filterPets(q) { renderPets(q); }
