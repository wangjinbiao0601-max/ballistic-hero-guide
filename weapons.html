<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weapons - Ballistic Hero 攻略站 · 弹弹英雄</title>
<meta name="description" content="Ballistic Hero 全武器图鉴 — 白绿蓝紫橙全品质武器数据，包括大炮、火箭筒、手炮、手雷、步枪、弓箭等类型">
<style>
:root {
  --bg: #0a0e1a; --bg-card: #111827; --bg-card-alt: #1a2332;
  --text: #e2e8f0; --text-secondary: #94a3b8; --text-muted: #64748b;
  --accent: #f59e0b; --accent-light: #fbbf24; --accent-dim: #d97706;
  --blue: #3b82f6; --blue-light: #60a5fa; --green: #22c55e; --red: #ef4444; --purple: #a855f7;
  --border: #1e293b; --border-light: #334155;
  --radius: 12px; --radius-sm: 8px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  --q-white: #e2e8f0; --q-green: #22c55e; --q-blue: #3b82f6; --q-purple: #a855f7; --q-orange: #f59e0b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
a { color:var(--blue-light); text-decoration:none; }
a:hover { text-decoration:underline; }
header { background:linear-gradient(135deg,#0f172a,#1a2332,#0f172a); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; padding:0 20px; }
.header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:60px; }
.logo { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; color:var(--accent); }
.logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),var(--accent-dim)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; color:#000; font-weight:900; }
.logo a, .logo a:hover { text-decoration:none; color:var(--accent); }
.lang-btn { background:var(--bg-card-alt); border:1px solid var(--border-light); color:var(--text); padding:6px 14px; border-radius:20px; cursor:pointer; font-size:13px; transition:all .2s; }
.lang-btn:hover { border-color:var(--accent); color:var(--accent); }
.lang-toggle-wrap { display:flex; align-items:center; gap:10px; }
.lang-label { font-size:12px; color:var(--text-muted); }
.tabs { background:var(--bg-card); border-bottom:1px solid var(--border); overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; }
.tabs-inner { max-width:1200px; margin:0 auto; display:flex; padding:0 20px; }
.tab { display:block; padding:12px 22px; font-size:14px; color:var(--text-secondary); border-bottom:2px solid transparent; transition:all .2s; }
.tab:hover { color:var(--accent); text-decoration:none; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }
main { max-width:1200px; margin:0 auto; padding:30px 20px; }
.section-title { font-size:24px; font-weight:700; color:var(--accent); margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.section-desc { color:var(--text-secondary); font-size:14px; margin-bottom:24px; }

/* Filter tabs */
.filter-bar { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.filter-btn { padding:6px 18px; border-radius:20px; border:1px solid var(--border-light); background:var(--bg-card-alt); color:var(--text-secondary); cursor:pointer; font-size:13px; transition:all .2s; }
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(245,158,11,0.1); font-weight:500; }

/* Weapon grid */
.weapon-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }

/* Quality badges */
.q-badge { display:inline-block; padding:2px 10px; border-radius:4px; font-size:11px; font-weight:600; }
.q-white { background:rgba(226,232,240,0.15); color:var(--q-white); }
.q-green { background:rgba(34,197,94,0.15); color:var(--q-green); }
.q-blue { background:rgba(59,130,246,0.15); color:var(--q-blue); }
.q-purple { background:rgba(168,85,247,0.15); color:var(--q-purple); }
.q-orange { background:rgba(245,158,11,0.15); color:var(--q-orange); }

.weapon-card { background:var(--bg-card-alt); border:1px solid var(--border); border-radius:var(--radius); padding:18px; cursor:pointer; transition:all .2s; }
.weapon-card:hover { transform:translateY(-2px); }
.weapon-card.orange:hover { border-color:var(--accent-dim); }
.weapon-card.orange.expanded { border-color:var(--accent); }
.weapon-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.weapon-card-name { font-size:15px; font-weight:700; }
.weapon-card-type { font-size:11px; padding:2px 8px; border-radius:4px; background:rgba(100,116,139,0.2); color:var(--text-secondary); }
.weapon-skill { margin-top:6px; padding:8px 10px; background:var(--bg); border-radius:6px; font-size:13px; color:var(--text-secondary); line-height:1.6; }
.weapon-skill strong { color:var(--accent-light); font-size:12px; display:block; margin-bottom:2px; }
.weapon-skills-detail { display:none; margin-top:12px; }
.weapon-card.orange.expanded .weapon-skills-detail { display:block; }
.skill-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:10px; }
.skill-table th { text-align:left; padding:8px 10px; background:var(--bg); color:var(--text-muted); font-weight:500; font-size:12px; border-bottom:1px solid var(--border); }
.skill-table td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
.skill-table tr:last-child td { border-bottom:none; }
.skill-name { color:var(--accent-light); font-weight:500; white-space:nowrap; }
.skill-cost { color:var(--text-muted); font-size:11px; display:block; }
.qty-group-title { font-size:16px; font-weight:700; margin:24px 0 12px; display:flex; align-items:center; gap:8px; }
footer { border-top:1px solid var(--border); padding:30px 20px; text-align:center; color:var(--text-muted); font-size:13px; }
@media (max-width:768px) { .weapon-grid { grid-template-columns:1fr; } .filter-btn { padding:5px 12px; font-size:12px; } .tab { padding:10px 14px; font-size:13px; } }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }
</style>
</head>

const QLABELS = {白:'q-white',绿:'q-green',蓝:'q-blue',紫:'q-purple',橙:'q-orange'};
let currentFilter = 'all';

function renderWeapons(filter) {
  currentFilter = filter;
  const container = document.getElementById('weaponContainer');
  const filtered = filter === 'all' ? ALL_WEAPONS : ALL_WEAPONS.filter(w => w.q === filter);

  // Group by quality
  const groups = {};
  filtered.forEach(w => {
    if (!groups[w.q]) groups[w.q] = [];
    groups[w.q].push(w);
  });

  const order = ['白','绿','蓝','紫','橙'];
  let html = '';
  order.forEach(q => {
    if (!groups[q]) return;
    html += `<div class="qty-group-title"><span class="q-badge ${QLABELS[q]}">${q}</span> 品质武器</div>`;
    html += '<div class="weapon-grid">';
    groups[q].forEach((w, idx) => {
      const cls = w.isOrange ? 'weapon-card orange' : 'weapon-card';
      const hasDetail = w.detail && w.detail.length > 0;
      html += `<div class="${cls}" ${hasDetail ? `onclick="toggleDetail(this)"` : ''}>`;

      // Header
      html += `<div class="weapon-card-header">
        <span class="weapon-card-name">${w.name}</span>
        <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(100,116,139,0.2);color:var(--text-secondary);flex-shrink:0;">${w.type}</span>
      </div>`;

      // Skill: Basic
      if (w.basic && w.basic !== '-1') {
        html += `<div class="weapon-skill"><strong>🔸 普攻</strong>${w.basic}</div>`;
      }
      // Skill: Ultimate
      if (w.ult && w.ult !== '-1') {
        html += `<div class="weapon-skill"><strong>🔹 必杀</strong>${w.ult}</div>`;
      }
      // Other
      if (w.other && w.other !== '-1') {
        html += `<div class="weapon-skill"><strong>🔸 被动</strong>${w.other}</div>`;
      }

      // Orange detail table
      if (hasDetail) {
        html += `<div class="weapon-skills-detail">
          <table class="skill-table">
            <thead><tr><th>技能</th><th>类型</th><th>消耗</th><th>效果</th></tr></thead>
            <tbody>`;
        w.detail.forEach(s => {
          html += `<tr><td><span class="skill-name">${s.name}</span></td><td>${s.type}</td><td class="skill-cost">${s.cost}</td><td>${s.eff}</td></tr>`;
        });
        html += `</tbody></table></div>`;
      }

      html += '</div>';
    });
    html += '</div>';
  });

  if (filtered.length === 0) {
    html = `<p style="color:var(--text-muted);text-align:center;padding:40px;">该品质暂无数据</p>`;
  }

  container.innerHTML = html;

  // Update filter button styles
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${filter}'`));
  });
}

function toggleDetail(card) {
  card.classList.toggle('expanded');
}

function filterWeapons(q) {
  renderWeapons(q);
}

// Init
renderWeapons('all');

let currentLang = localStorage.getItem('bh_lang') || 'zh';
function applyLang(lang) {
  currentLang = lang;
  const dict = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key] !== undefined) el.textContent = dict[key];
  });
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.getElementById('langToggle').textContent = lang === 'zh' ? 'English' : '中文';
  localStorage.setItem('bh_lang', lang);
}
function toggleLang() { applyLang(currentLang === 'zh' ? 'en' : 'zh'); }
